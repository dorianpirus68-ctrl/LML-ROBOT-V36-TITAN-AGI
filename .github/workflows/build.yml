name: Build LML Sniper APK

on: 
  push:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4
        with:
          accept-android-sdk-licenses: true

      - name: Install Android SDK Packages
        run: |
          sdkmanager "platforms;android-34"
          sdkmanager "build-tools;34.0.0"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Create complete LML Robot AI Project and Build
        env:
          KEYSTORE_BASE64: ${{ secrets.LML_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD || 'android' }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS || 'key0' }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD || 'android' }}
        run: |
          set -e
          echo "=== 1. Création de la structure du projet ==="
          mkdir -p app/src/main/java/com/lml/robotai
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/drawable
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/xml

          # --- Fichiers de configuration Gradle ---
          cat > settings.gradle << 'EOF'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = "LMLRobot"
          include ':app'
          EOF

          cat > build.gradle << 'EOF'
          plugins {
              id 'com.android.application' version '8.5.2' apply false
          }
          EOF

          cat > gradle.properties << 'EOF'
          org.gradle.jvmargs=-Xmx4g
          android.useAndroidX=true
          android.enableJetifier=true
          EOF

          cat > app/build.gradle << 'EOF'
          plugins {
              id 'com.android.application'
          }

          android {
              namespace 'com.lml.robotai'
              compileSdk 34

              defaultConfig {
                  applicationId "com.lml.robotai"
                  minSdk 24
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }

              signingConfigs {
                  release {
                      storeFile file('lml-stable.keystore')
                      storePassword System.getenv('KEYSTORE_PASSWORD')
                      keyAlias System.getenv('KEY_ALIAS')
                      keyPassword System.getenv('KEY_PASSWORD')
                  }
              }

              buildTypes {
                  release {
                      if (System.getenv('KEYSTORE_PASSWORD') != null) {
                          signingConfig signingConfigs.release
                      }
                      minifyEnabled false
                  }
                  debug {
                      minifyEnabled false
                  }
              }

              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
          }

          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
          }
          EOF

          # --- Fichiers Ressources Android (XML) ---
          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.SYSTEM_ALERT_WINDOW" />
              <application
                  android:allowBackup="true"
                  android:icon="@drawable/ic_launcher"
                  android:label="@string/app_name"
                  android:supportsRtl="true"
                  android:theme="@style/Theme.LML">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
                  <service
                      android:name=".LmlAccessibilityService"
                      android:exported="false"
                      android:permission="android.permission.BIND_ACCESSIBILITY_SERVICE">
                      <intent-filter>
                          <action android:name="android.accessibilityservice.AccessibilityService" />
                      </intent-filter>
                      <meta-data
                          android:name="android.accessibilityservice"
                          android:resource="@xml/accessibility_service_config" />
                  </service>
                  <service android:name=".FloatingRobotService" />
              </application>
          </manifest>
          EOF

          cat > app/src/main/res/values/styles.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="Theme.LML" parent="Theme.AppCompat.Light.DarkActionBar" />
          </resources>
          EOF

          cat > app/src/main/res/drawable/ic_launcher.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <vector xmlns:android="http://schemas.android.com/apk/res/android"
              android:width="108dp" android:height="108dp"
              android:viewportWidth="108" android:viewportHeight="108">
              <path android:fillColor="#2196F3" android:pathData="M54,54m-40,0a40,40 0,1 1,80 0a40,40 0,1 1,-80 0" />
              <path android:fillColor="#FFFFFF" android:pathData="M35,40 L73,40 L73,68 L35,68 Z M40,45 L68,45 L68,63 L40,63 Z" />
          </vector>
          EOF

          cat > app/src/main/res/layout/activity_main.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent" android:layout_height="match_parent"
              android:orientation="vertical" android:gravity="center" android:padding="24dp">
              <TextView android:layout_width="wrap_content" android:layout_height="wrap_content"
                  android:text="LML Sniper" android:textSize="28sp" android:textStyle="bold"
                  android:layout_marginBottom="32dp" />
              <Button android:id="@+id/btn_accessibility" android:layout_width="wrap_content"
                  android:layout_height="wrap_content" android:text="Activer le service d'accessibilité"
                  android:layout_marginBottom="16dp" />
              <Button android:id="@+id/btn_floating" android:layout_width="wrap_content"
                  android:layout_height="wrap_content" android:text="Lancer le Robot Flottant" />
          </LinearLayout>
          EOF

          cat > app/src/main/res/values/strings.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <string name="app_name">LML Sniper</string>
          </resources>
          EOF

          cat > app/src/main/res/xml/accessibility_service_config.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <accessibility-service xmlns:android="http://schemas.android.com/apk/res/android"
              android:accessibilityEventTypes="typeWindowStateChanged|typeWindowContentChanged"
              android:accessibilityFeedbackType="feedbackGeneric"
              android:canRetrieveWindowContent="true"
              android:canPerformGestures="true"
              android:notificationTimeout="50" />
          EOF

          # --- Fichiers Source Java ---
          cat > app/src/main/java/com/lml/robotai/ScreenNode.java << 'EOF'
          package com.lml.robotai;
          public class ScreenNode {
              public String text; public int x, y, width, height;
              public ScreenNode(String text, int x, int y, int width, int height) {
                  this.text = text; this.x = x; this.y = y; this.width = width; this.height = height;
              }
              public int cx() { return x + width / 2; }
              public int cy() { return y + height / 2; }
              public String label() { return text != null ? text : ""; }
          }
          EOF

          cat > app/src/main/java/com/lml/robotai/LmlAccessibilityService.java << 'EOF'
          package com.lml.robotai;
          import android.accessibilityservice.AccessibilityService;
          import android.accessibilityservice.GestureDescription;
          import android.graphics.Path;
          import android.graphics.Rect;
          import android.view.accessibility.AccessibilityEvent;
          import android.view.accessibility.AccessibilityNodeInfo;
          import java.util.List;

          public class LmlAccessibilityService extends AccessibilityService {
              public static LmlAccessibilityService INSTANCE;
              public static boolean isAutoClickEnabled = false;
              private long lastClickTime = 0;
              
              @Override protected void onServiceConnected() { 
                  super.onServiceConnected(); 
                  INSTANCE = this;
              }

              @Override 
              public void onAccessibilityEvent(AccessibilityEvent event) {
                  if (!isAutoClickEnabled) return;
                  
                  // Anti-spam: pause de 1 seconde entre chaque clic pour être sûr
                  if (System.currentTimeMillis() - lastClickTime < 1000) return;

                  AccessibilityNodeInfo rootNode = getRootInActiveWindow();
                  if (rootNode == null) return;

                  // 1. Android cherche directement tous les textes "supprimer"
                  List<AccessibilityNodeInfo> nodes = rootNode.findAccessibilityNodeInfosByText("supprimer");
                  
                  for (AccessibilityNodeInfo node : nodes) {
                      if (node.getText() == null) continue;
                      
                      String text = node.getText().toString().toLowerCase().trim();
                      
                      // 2. Vérification stricte pour isoler le bouton gris
                      if (text.equals("supprimer")) {
                          
                          boolean clicked = false;
                          AccessibilityNodeInfo clickableNode = node;
                          
                          // 3. CLIC NATIF : On remonte l'arbre pour trouver l'élément cliquable
                          while (clickableNode != null) {
                              if (clickableNode.isClickable()) {
                                  // Déclenche l'action officielle d'Android !
                                  clickableNode.performAction(AccessibilityNodeInfo.ACTION_CLICK);
                                  clicked = true;
                                  break;
                              }
                              clickableNode = clickableNode.getParent();
                          }
                          
                          // 4. PLAN B : Si le clic natif échoue, on force les coordonnées
                          if (!clicked) {
                              Rect bounds = new Rect();
                              node.getBoundsInScreen(bounds);
                              tap(bounds.centerX(), bounds.centerY());
                          }
                          
                          lastClickTime = System.currentTimeMillis();
                          break; // Mission accomplie, on arrête de chercher
                      }
                  }
                  
                  rootNode.recycle(); // Libère la mémoire
              }
              
              // Méthode de secours (Plan B)
              public void tap(int x, int y) {
                  Path path = new Path();
                  path.moveTo(x, y);
                  GestureDescription.Builder builder = new GestureDescription.Builder();
                  builder.addStroke(new GestureDescription.StrokeDescription(path, 10, 50));
                  dispatchGesture(builder.build(), null, null);
              }

              @Override public void onInterrupt() {}
          }
          EOF

          cat > app/src/main/java/com/lml/robotai/FloatingRobotService.java << 'EOF'
          package com.lml.robotai;
          import android.app.Service;
          import android.content.Intent;
          import android.graphics.Color;
          import android.graphics.PixelFormat;
          import android.os.IBinder;
          import android.view.Gravity;
          import android.view.LayoutInflater;
          import android.view.MotionEvent;
          import android.view.View;
          import android.view.WindowManager;
          import android.widget.TextView;

          public class FloatingRobotService extends Service {
              private WindowManager windowManager; 
              private View floatingView;
              private TextView robotTextView;

              @Override public IBinder onBind(Intent intent) { return null; }
              
              @Override public int onStartCommand(Intent intent, int flags, int startId) {
                  showFloatingRobot(); 
                  return START_STICKY;
              }

              private void showFloatingRobot() {
                  windowManager = (WindowManager) getSystemService(WINDOW_SERVICE);
                  floatingView = LayoutInflater.from(this).inflate(android.R.layout.simple_list_item_1, null);
                  robotTextView = floatingView.findViewById(android.R.id.text1);
                  
                  robotTextView.setText("🎯 LML OFF"); 
                  robotTextView.setTextSize(16); 
                  robotTextView.setTextColor(Color.RED);
                  robotTextView.setGravity(Gravity.CENTER);
                  
                  WindowManager.LayoutParams params = new WindowManager.LayoutParams(
                      WindowManager.LayoutParams.WRAP_CONTENT, WindowManager.LayoutParams.WRAP_CONTENT,
                      WindowManager.LayoutParams.TYPE_APPLICATION_OVERLAY,
                      WindowManager.LayoutParams.FLAG_NOT_FOCUSABLE, PixelFormat.TRANSLUCENT);
                  params.gravity = Gravity.TOP | Gravity.START; params.x = 100; params.y = 300;
                  
                  floatingView.setOnTouchListener(new View.OnTouchListener() {
                      private int initialX, initialY; 
                      private float initialTouchX, initialTouchY;
                      private long touchStartTime;
                      
                      @Override public boolean onTouch(View v, MotionEvent event) {
                          switch (event.getAction()) {
                              case MotionEvent.ACTION_DOWN:
                                  initialX = params.x; initialY = params.y;
                                  initialTouchX = event.getRawX(); initialTouchY = event.getRawY();
                                  touchStartTime = System.currentTimeMillis();
                                  return true;
                                  
                              case MotionEvent.ACTION_MOVE:
                                  params.x = initialX + (int)(event.getRawX() - initialTouchX);
                                  params.y = initialY + (int)(event.getRawY() - initialTouchY);
                                  windowManager.updateViewLayout(floatingView, params); 
                                  return true;
                                  
                              case MotionEvent.ACTION_UP:
                                  long touchDuration = System.currentTimeMillis() - touchStartTime;
                                  float diffX = Math.abs(event.getRawX() - initialTouchX);
                                  float diffY = Math.abs(event.getRawY() - initialTouchY);
                                  
                                  if (touchDuration < 200 && diffX < 10 && diffY < 10) {
                                      LmlAccessibilityService.isAutoClickEnabled = !LmlAccessibilityService.isAutoClickEnabled;
                                      
                                      if (LmlAccessibilityService.isAutoClickEnabled) {
                                          robotTextView.setText("🎯 SNIPER ON");
                                          robotTextView.setTextColor(Color.GREEN);
                                      } else {
                                          robotTextView.setText("🎯 LML OFF");
                                          robotTextView.setTextColor(Color.RED);
                                      }
                                  }
                                  return true;
                          } 
                          return false;
                      }
                  });
                  windowManager.addView(floatingView, params);
              }

              @Override public void onDestroy() {
                  super.onDestroy();
                  if (floatingView != null) windowManager.removeView(floatingView);
              }
          }
          EOF

          cat > app/src/main/java/com/lml/robotai/MainActivity.java << 'EOF'
          package com.lml.robotai;
          import android.content.Intent;
          import android.net.Uri;
          import android.os.Build;
          import android.os.Bundle;
          import android.provider.Settings;
          import android.widget.Button;
          import android.widget.Toast;
          import androidx.appcompat.app.AppCompatActivity;

          public class MainActivity extends AppCompatActivity {
              @Override protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_main);
                  Button btnAcc = findViewById(R.id.btn_accessibility);
                  Button btnFloat = findViewById(R.id.btn_floating);
                  
                  btnAcc.setOnClickListener(v -> {
                      startActivity(new Intent(Settings.ACTION_ACCESSIBILITY_SETTINGS));
                      Toast.makeText(this, "Active 'LML Sniper' dans les services d'accessibilité", Toast.LENGTH_LONG).show();
                  });
                  
                  btnFloat.setOnClickListener(v -> {
                      if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.M && !Settings.canDrawOverlays(this)) {
                          startActivity(new Intent(Settings.ACTION_MANAGE_OVERLAY_PERMISSION, Uri.parse("package:" + getPackageName())));
                          Toast.makeText(this, "Autorise l'affichage par-dessus les autres apps", Toast.LENGTH_LONG).show();
                      } else {
                          startService(new Intent(this, FloatingRobotService.class));
                          Toast.makeText(this, "Robot flottant lancé !", Toast.LENGTH_SHORT).show();
                      }
                  });
              }
          }
          EOF

          echo "=== 2. Gestion de la Signature et Build Gradle ==="
          gradle wrapper --gradle-version 8.7
          chmod +x gradlew

          if [ -n "$KEYSTORE_BASE64" ] && [ ${#KEYSTORE_BASE64} -gt 100 ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > app/lml-stable.keystore
            echo "✓ Keystore décodé avec succès. Compilation en Release..."
            ./gradlew clean assembleRelease --stacktrace --info
          else
            echo "⚠️ Pas de keystore valide détecté. Compilation en Debug..."
            ./gradlew clean assembleDebug --stacktrace --info
          fi

          echo "=== ✅ BUILD TERMINE ==="

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: LML-Sniper-APK
          path: app/build/outputs/apk/**/*.apk
          retention-days: 30

