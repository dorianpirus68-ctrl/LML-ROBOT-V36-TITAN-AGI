name: LML ROBOT V36 TITAN AGI

on:
  push:
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: android-actions/setup-android@v3

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.7

      - name: Create LML V36 TITAN project (Python - more reliable)
        run: |
          python3 -c '
          import os
          os.makedirs("app/src/main/java/com/lml/robotai", exist_ok=True)
          os.makedirs("app/src/main/res/xml", exist_ok=True)
          os.makedirs("app/src/main/res/values", exist_ok=True)

          # settings.gradle
          with open("settings.gradle", "w") as f:
              f.write("""pluginManagement { repositories { google(); mavenCentral(); gradlePluginPortal() } }
          dependencyResolutionManagement { repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS); repositories { google(); mavenCentral() } }
          rootProject.name = "LMLRobotAIV36"
          include ":app"
          """)

          # build.gradle (root)
          with open("build.gradle", "w") as f:
              f.write("""plugins { id "com.android.application" version "8.5.2" apply false }""")

          # gradle.properties
          with open("gradle.properties", "w") as f:
              f.write("""android.useAndroidX=true
          android.enableJetifier=true
          org.gradle.jvmargs=-Xmx2g -Dfile.encoding=UTF-8
          """)

          # app/build.gradle (FIXED + complete)
          with open("app/build.gradle", "w") as f:
              f.write("""plugins { id "com.android.application" }

          def runNumber = System.getenv("GITHUB_RUN_NUMBER")
          def autoVersionCode = runNumber != null ? runNumber.toInteger() : 1
          def autoVersionName = "1.0." + autoVersionCode

          android {
              namespace "com.lml.robotai"
              compileSdk 34

              defaultConfig {
                  applicationId "com.lml.robotai.v36"
                  minSdk 26
                  targetSdk 34
                  versionCode autoVersionCode
                  versionName autoVersionName
              }

              buildFeatures { buildConfig true }

              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }

              signingConfigs {
                  lmlStable {
                      storeFile file("lml-stable.keystore")
                      storePassword "lmlrobot"
                      keyAlias "lml"
                      keyPassword "lmlrobot"
                  }
              }

              buildTypes {
                  debug { signingConfig signingConfigs.lmlStable }
                  release { signingConfig signingConfigs.lmlStable; minifyEnabled false }
              }
          }

          dependencies {
              // Add any dependencies here if needed later
          }
          """)

          print("Core Gradle files created successfully")
          '

      - name: Install Android SDK
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "platforms;android-34" || true
          sdkmanager "build-tools;34.0.0" || true

      - name: Build
        run: |
          gradle assembleRelease --no-daemon --stacktrace --info

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: LML-AGI-V36-TITAN-APK
          path: app/build/outputs/apk/release/*.apk
